<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CMP Autoboot — MOG APL Mapper</title>
<style>
/* ─── Reset ─────────────────────────────────── */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
  background: #ffffff;
  display: flex;
  height: 100vh;
  overflow: hidden;
  font-size: 13px;
  color: #0F172A;
  -webkit-font-smoothing: antialiased;
}

/* ─── Sidebar ────────────────────────────────── */
.sidebar {
  width: 192px;
  background: #ffffff;
  border-right: 1px solid #E8ECF2;
  display: flex; flex-direction: column;
  flex-shrink: 0;
}
.sidebar-brand {
  padding: 18px 16px 14px;
  border-bottom: 1px solid #E8ECF2;
}
.sidebar-brand-row {
  display: flex; align-items: center; gap: 9px; margin-bottom: 4px;
}
.brand-icon {
  width: 28px; height: 28px;
  background: #EEF2F7; border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-size: 9.5px; font-weight: 700; color: #475569; flex-shrink: 0;
}
.brand-name { font-size: 12.5px; font-weight: 600; color: #334155; }
.brand-sub  { font-size: 10.5px; color: #94A3B8; margin-top: 1px; }
.sidebar-nav { padding: 10px 8px; }
.nav-item {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 10px; border-radius: 7px;
  cursor: pointer; color: #94A3B8; font-size: 12.5px;
  margin-bottom: 2px; white-space: nowrap;
  transition: background .12s, color .12s;
}
.nav-item:hover  { background: #F1F5F9; color: #334155; }
.nav-item.active { background: #EEF2F7; color: #334155; font-weight: 500; }
.nav-item svg { width: 14px; height: 14px; flex-shrink: 0; }

/* ─── Queue Panel ────────────────────────────── */
.queue-panel {
  width: 324px;
  background: #ffffff;
  border-right: 1px solid #E8ECF2;
  display: flex; flex-direction: column;
  flex-shrink: 0;
}
.queue-header {
  padding: 16px 14px 13px;
  border-bottom: 1px solid #F1F5F9;
}
.queue-title {
  font-size: 13px; font-weight: 600; color: #0F172A;
  margin-bottom: 13px; letter-spacing: -.1px;
}

/* Filter tabs — 4 equal columns, labels wrap naturally */
.ftab-row {
  display: grid; grid-template-columns: repeat(4,1fr);
  gap: 5px; margin-bottom: 12px;
}
.ftab {
  padding: 8px 4px 7px;
  border: 1px solid #E2E8F0;
  border-top-width: 2px;
  border-radius: 8px;
  cursor: pointer; background: #ffffff;
  text-align: center;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 2px; min-height: 46px; overflow: hidden;
  transition: background .12s, border-color .12s;
}
.ftab:hover { background: #F8FAFC; }
.ftab-amber.active { background: #FAFAFA; border-color: #E2E8F0; border-top-color: #F59E0B; }
.ftab-green.active { background: #F0FDF4; border-color: #BBF7D0; border-top-color: #16A34A; }
.ftab-red.active   { background: #FFF1F2; border-color: #FECACA; border-top-color: #EF4444; }
.ftab-blue.active  { background: #F0F9FF; border-color: #BAE6FD; border-top-color: #3B82F6; }
.ftab-top { display: flex; align-items: center; gap: 3px; }
.ftab-name { font-size: 10px; font-weight: 700; letter-spacing: .2px; white-space: nowrap; }
.ftab-count {
  display: inline-flex; align-items: center; justify-content: center;
  height: 14px; min-width: 16px; padding: 0 3px;
  border-radius: 6px; font-size: 9px; font-weight: 700; flex-shrink: 0;
}
.ftab-hint {
  font-size: 8.5px; color: #94A3B8; line-height: 1.25;
  text-align: center; word-break: break-word; max-width: 100%;
}
.ftab-amber .ftab-name  { color: #92400E; }
.ftab-amber .ftab-count { background: #FEF3C7; color: #92400E; }
.ftab-green .ftab-name  { color: #14532D; }
.ftab-green .ftab-count { background: #DCFCE7; color: #14532D; }
.ftab-red   .ftab-name  { color: #7F1D1D; }
.ftab-red   .ftab-count { background: #FEE2E2; color: #7F1D1D; }
.ftab-blue  .ftab-name  { color: #1E3A8A; }
.ftab-blue  .ftab-count { background: #DBEAFE; color: #1E3A8A; }

/* Search */
.search-row { display: flex; gap: 6px; }
.search-box {
  flex: 1; padding: 7px 10px;
  border: 1px solid #E2E8F0; border-radius: 7px;
  font-size: 12px; outline: none; color: #334155;
  background: #F8FAFC;
  transition: border-color .12s, background .12s;
}
.search-box:focus { border-color: #CBD5E1; background: #fff; }
.search-box::placeholder { color: #CBD5E1; }
.filter-icon-btn {
  padding: 7px 9px; border: 1px solid #E2E8F0; border-radius: 7px;
  background: #F8FAFC; cursor: pointer; display: flex; align-items: center; flex-shrink: 0;
  transition: background .12s;
}
.filter-icon-btn:hover { background: #EEF2F7; }

/* Queue rows */
.q-list { overflow-y: auto; flex: 1; }

.q-item {
  padding: 12px 14px 12px 18px;
  border-bottom: 1px solid #F4F6F9;
  cursor: pointer; position: relative;
  transition: background .1s;
}
.q-item::before {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0;
  width: 3px; border-radius: 0 2px 2px 0;
  opacity: .5;
}
.q-item.c-amber::before { background: #F59E0B; }
.q-item.c-red::before   { background: #EF4444; }
.q-item.c-blue::before  { background: #3B82F6; }
.q-item.c-green::before { background: #10B981; }

/* Hover */
.q-item:hover { background: #FAFBFC; }

/* Selected — light grey bg + full-opacity queue accent, no color override */
.q-item.selected { background: #F8FAFC; }
.q-item.selected::before { opacity: 1; width: 3px; }

/* Row text */
.q-name {
  font-size: 12.5px; font-weight: 600; color: #0F172A;
  margin-bottom: 2px;
  display: flex; align-items: center; gap: 6px;
}
.q-loc  { font-size: 10.5px; color: #94A3B8; margin-bottom: 7px; }
.q-apl-block { display: flex; flex-direction: column; gap: 3px; margin-bottom: 5px; }
.q-apl-line  { font-size: 11px; color: #64748B; display: flex; align-items: baseline; gap: 4px; }
.q-apl-line strong { color: #0F172A; font-weight: 500; }
.q-apl-tag   { font-size: 9.5px; color: #94A3B8; }
.q-more-opts { font-size: 10px; color: #94A3B8; }
.q-no-suggest{ font-size: 11px; color: #CBD5E1; font-style: italic; }
.q-saving    { font-size: 10.5px; color: #16A34A; font-weight: 500; display: flex; align-items: center; gap: 3px; margin-bottom: 3px; }
.q-reason    { font-size: 10.5px; color: #CBD5E1; }
.q-badge {
  display: inline-flex; align-items: center; justify-content: center;
  background: #F1F5F9; color: #64748B;
  border: 1px solid #E2E8F0;
  border-radius: 6px; padding: 0 5px;
  font-size: 9px; font-weight: 600; height: 15px; flex-shrink: 0;
}
.q-empty {
  display: none; padding: 44px 20px; text-align: center;
  color: #94A3B8; font-size: 12px; line-height: 1.6;
}
.q-empty svg { margin: 0 auto 10px; display: block; opacity: .25; }

/* ─── Detail Panel ───────────────────────────── */
.main-content {
  flex: 1; display: flex; flex-direction: column; min-width: 0; overflow: hidden;
}
.content-header {
  padding: 18px 24px 15px;
  border-bottom: 1px solid #E8ECF2;
  background: #ffffff;
}
.header-row {
  display: flex; align-items: center; gap: 10px; margin-bottom: 6px;
}
.page-title {
  font-size: 20px; font-weight: 700; color: #0F172A; letter-spacing: -.4px;
}
.status-pill {
  padding: 3px 10px; border: 1px solid #E2E8F0; border-radius: 20px;
  font-size: 11px; color: #94A3B8; background: #F8FAFC;
}
.breadcrumb { font-size: 11.5px; color: #94A3B8; display: flex; align-items: center; gap: 5px; }
.bc-sep { color: #CBD5E1; }

.content-body {
  flex: 1; overflow-y: auto; padding: 22px 24px; background: #ffffff;
}

/* Recommended / context card */
.rec-card {
  background: #F8FAFC; border: 1px solid #E8ECF2;
  border-left: 3px solid #94A3B8;
  border-radius: 8px; padding: 14px 16px;
  display: flex; align-items: flex-start; gap: 13px;
  margin-bottom: 24px;
}
.rec-card.rc-green { border-left-color: #10B981; }
.rec-card.rc-red   { border-left-color: #EF4444; }
.rec-card.rc-blue  { border-left-color: #3B82F6; }
.rec-icon {
  width: 28px; height: 28px; flex-shrink: 0;
  background: #EEF2F7; border-radius: 7px;
  display: flex; align-items: center; justify-content: center; margin-top: 1px;
}
.rec-label {
  font-size: 10px; font-weight: 600; color: #64748B;
  text-transform: uppercase; letter-spacing: .6px; margin-bottom: 4px;
}
.rec-heading { font-size: 13px; font-weight: 600; color: #0F172A; margin-bottom: 3px; }
.rec-sub { font-size: 12px; color: #64748B; }

/* APL columns */
.apl-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 22px; }
.apl-col-title {
  font-size: 10px; font-weight: 600; color: #94A3B8;
  text-transform: uppercase; letter-spacing: .6px; margin-bottom: 10px;
}

/* APL cards */
.apl-card {
  background: #ffffff; border: 1px solid #E8ECF2;
  border-radius: 9px; padding: 15px 15px 13px; margin-bottom: 9px;
}
.apl-card.default-apl { border-left: 3px solid #86EFAC; }
.apl-card.suggested-card { background: #F8FEFF; border-color: #BAE6FD; }
.apl-extra { display: none; }
.apl-extra.visible { display: block; animation: revealCard .16s ease; }
@keyframes revealCard { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }

.card-header { display: flex; align-items: center; gap: 7px; margin-bottom: 13px; }
.apl-tag {
  padding: 2px 7px; border-radius: 4px;
  font-size: 10px; font-weight: 600;
  font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace; letter-spacing: .2px;
}
.apl-tag-light   { background: #F1F5F9; color: #475569; border: 1px solid #E2E8F0; }
.apl-tag-suggest { background: #DBEAFE; color: #1D4ED8; border: 1px solid #BFDBFE; }

.badge-default {
  margin-left: auto; padding: 2px 8px;
  background: #F1F5F9; border: 1px solid #CBD5E1;
  border-radius: 20px; font-size: 9.5px; font-weight: 600; color: #475569;
}
.badge-new {
  margin-left: auto; padding: 2px 8px;
  background: #DCFCE7; border: 1px solid #BBF7D0;
  border-radius: 20px; font-size: 9.5px; font-weight: 600; color: #14532D;
}
.badge-diff {
  padding: 2px 8px; background: #F8FAFC; border: 1px solid #E2E8F0;
  border-radius: 20px; font-size: 9.5px; color: #64748B;
}
.badge-trans {
  padding: 2px 8px; background: #EFF6FF; border: 1px solid #BFDBFE;
  border-radius: 20px; font-size: 9.5px; color: #1D4ED8;
}
.star { color: #FBBF24; font-size: 13px; line-height: 1; }

.field-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.field-label {
  font-size: 9.5px; color: #CBD5E1; text-transform: uppercase;
  font-weight: 500; letter-spacing: .5px; display: block; margin-bottom: 2px;
}
.field-value { font-size: 13px; font-weight: 600; color: #0F172A; display: block; }
.field-row { margin-top: 12px; }
.cost-compare { font-size: 10.5px; color: #94A3B8; margin-top: 3px; display: block; }

.status-tag {
  display: inline-block; padding: 2px 9px;
  background: #F0FDF4; color: #15803D;
  border: 1px solid #DCFCE7; border-radius: 20px;
  font-size: 10px; font-weight: 500; margin-top: 12px;
}
.savings-pill {
  display: flex; align-items: center; gap: 5px;
  color: #15803D; font-size: 11.5px; font-weight: 500;
  background: #F0FDF4; border: 1px solid #DCFCE7;
  border-radius: 6px; padding: 5px 9px; margin-top: 12px;
}
.will-add { font-size: 10.5px; color: #94A3B8; margin-top: 6px; font-style: italic; }

.view-all-btn {
  width: 100%; padding: 8px 12px;
  border: 1px dashed #CBD5E1; border-radius: 7px;
  background: transparent; font-size: 11.5px; color: #64748B;
  cursor: pointer; font-weight: 500;
  display: flex; align-items: center; justify-content: center; gap: 6px;
  transition: border-color .12s, color .12s, background .12s;
  margin-bottom: 9px;
}
.view-all-btn:hover { border-color: #94A3B8; background: #F8FAFC; color: #334155; }

/* No-supplier state */
.no-supplier-block {
  background: #FAFAFA; border: 1px dashed #E2E8F0;
  border-radius: 9px; padding: 24px;
  text-align: center; color: #94A3B8;
}
.no-supplier-block svg { margin: 0 auto 10px; display: block; opacity: .3; }
.no-supplier-block p { font-size: 12.5px; line-height: 1.6; }
.no-supplier-block strong { color: #64748B; font-weight: 500; }

/* History context */
.history-context {
  margin-top: 22px; padding-top: 18px;
  border-top: 1px solid #E8ECF2;
  display: flex; gap: 32px;
}
.hc-label {
  font-size: 9.5px; color: #CBD5E1;
  text-transform: uppercase; letter-spacing: .4px;
  font-weight: 500; margin-bottom: 3px;
}
.hc-value { font-size: 12px; color: #64748B; }

/* ─── Action Panel ───────────────────────────── */
.right-panel {
  width: 272px; background: #ffffff;
  border-left: 1px solid #E8ECF2;
  display: flex; flex-direction: column; flex-shrink: 0;
}
.panel-topbar {
  display: flex; align-items: center; justify-content: flex-end;
  padding: 10px 16px 0;
}
.ods-pill { display: flex; align-items: center; gap: 4px; font-size: 11px; color: #94A3B8; }
.ods-dot  { width: 6px; height: 6px; background: #4ADE80; border-radius: 50%; box-shadow: 0 0 0 2px #DCFCE7; margin-left: 3px; }
.panel-tabs { display: flex; border-bottom: 1px solid #E8ECF2; padding: 0 16px; margin-top: 6px; }
.p-tab {
  padding: 10px 12px; font-size: 12.5px; font-weight: 500;
  color: #94A3B8; border-bottom: 2px solid transparent; cursor: pointer;
  transition: color .12s;
}
.p-tab.active { color: #0F172A; border-bottom-color: #334155; }
.panel-body { padding: 20px 16px; flex: 1; overflow-y: auto; }

/* Radio */
.p-section-title { font-size: 12.5px; font-weight: 600; color: #0F172A; margin-bottom: 3px; }
.p-section-sub   { font-size: 11.5px; color: #94A3B8; margin-bottom: 16px; }
.radio-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
.radio-opt {
  display: flex; align-items: flex-start; gap: 9px;
  padding: 11px 12px; border: 1px solid #E2E8F0; border-radius: 8px;
  cursor: pointer; transition: border-color .12s, background .12s;
}
.radio-opt:hover    { background: #FAFBFC; border-color: #CBD5E1; }
.radio-opt.selected { border-color: #94A3B8; background: #F8FAFC; }
.radio-opt input[type="radio"] { margin-top: 2px; accent-color: #334155; cursor: pointer; flex-shrink: 0; }
.r-label { font-size: 12.5px; font-weight: 500; color: #0F172A; }
.r-cost  { font-size: 11.5px; color: #64748B; margin-top: 1px; }
.r-cost-save { color: #16A34A; font-weight: 600; }

/* Divider */
.panel-divider { height: 1px; background: #F1F5F9; margin: 2px -16px 20px; }

/* Buttons */
.action-btns { display: flex; flex-direction: column; gap: 9px; }
.btn-wrap { display: flex; flex-direction: column; gap: 4px; }
.btn-confirm {
  width: 100%; padding: 12px 16px;
  background: #0F172A; color: #ffffff;
  border: none; border-radius: 8px;
  font-size: 13px; font-weight: 600; cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 7px;
  transition: background .15s; letter-spacing: .1px;
}
.btn-confirm:hover { background: #1E293B; }
.btn-confirm.btn-assign {
  background: #1E40AF;
}
.btn-confirm.btn-assign:hover { background: #1D4ED8; }
.btn-modify {
  width: 100%; padding: 10px 16px;
  background: #ffffff; color: #334155;
  border: 1px solid #CBD5E1; border-radius: 8px;
  font-size: 12.5px; font-weight: 500; cursor: pointer;
  transition: background .12s, border-color .12s;
}
.btn-modify:hover { background: #F8FAFC; border-color: #94A3B8; }
.btn-reject {
  width: 100%; padding: 10px 16px;
  background: #ffffff; color: #DC2626;
  border: 1px solid #FECACA; border-radius: 8px;
  font-size: 12.5px; font-weight: 500; cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 6px;
  transition: background .12s, border-color .12s;
}
.btn-reject:hover { background: #FEF2F2; border-color: #FCA5A5; }
.btn-desc { font-size: 10.5px; color: #CBD5E1; text-align: center; line-height: 1.4; }

/* Scrollbars */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #E2E8F0; border-radius: 4px; }

/* ─── Edit Mode — APL column ─────────────────── */
.edit-col-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 12px;
}
.edit-override-tag {
  display: inline-flex; align-items: center; gap: 4px;
  background: #F1F5F9; border: 1px solid #E2E8F0;
  border-radius: 20px; padding: 2px 9px;
  font-size: 9.5px; color: #475569; font-weight: 600;
}

.apl-search-wrap { position: relative; margin-bottom: 9px; }
.apl-search-input {
  width: 100%; padding: 7px 10px 7px 28px;
  border: 1px solid #E2E8F0; border-radius: 7px;
  font-size: 12px; color: #334155; background: #F8FAFC;
  outline: none; transition: border-color .12s, background .12s;
}
.apl-search-input:focus { border-color: #CBD5E1; background: #fff; }
.apl-search-icon {
  position: absolute; left: 9px; top: 50%; transform: translateY(-50%);
  pointer-events: none;
}

.apl-option-list { display: flex; flex-direction: column; gap: 5px; }

.apl-option {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px; border: 1px solid #E8ECF2;
  border-radius: 8px; background: #fff;
  transition: border-color .12s, background .12s;
}
.apl-option.opt-added { border-color: #86EFAC; background: #F0FDF4; }

.apl-opt-info { flex: 1; min-width: 0; }
.apl-opt-top {
  display: flex; align-items: center; gap: 5px;
  flex-wrap: wrap; margin-bottom: 3px;
}
.apl-opt-id {
  font-family: 'SF Mono','Fira Code','Consolas',monospace;
  font-size: 9px; background: #F1F5F9; border: 1px solid #E2E8F0;
  border-radius: 4px; padding: 1px 5px; color: #475569;
}
.tag-ai-pick {
  font-size: 9px; background: #DBEAFE; border: 1px solid #BFDBFE;
  border-radius: 20px; padding: 1px 6px; color: #1D4ED8; font-weight: 600;
}
.apl-opt-brand { font-size: 12px; font-weight: 500; color: #0F172A; }
.apl-opt-meta {
  font-size: 10.5px; color: #64748B;
  display: flex; align-items: center; gap: 7px; flex-wrap: wrap; margin-top: 1px;
}
.opt-cost-hi { color: #B45309; font-weight: 500; }
.opt-cost-lo { color: #15803D; font-weight: 500; }

.btn-opt-add {
  flex-shrink: 0; padding: 4px 10px;
  background: #F1F5F9; color: #475569;
  border: 1px solid #E2E8F0; border-radius: 6px;
  font-size: 11px; font-weight: 500; cursor: pointer;
  white-space: nowrap; transition: background .1s;
}
.btn-opt-add:hover { background: #E2E8F0; color: #334155; }
.btn-opt-remove {
  flex-shrink: 0; padding: 4px 10px;
  background: #FEF2F2; color: #DC2626;
  border: 1px solid #FECACA; border-radius: 6px;
  font-size: 11px; font-weight: 500; cursor: pointer;
  white-space: nowrap; transition: background .1s;
}
.btn-opt-remove:hover { background: #FEE2E2; }

.apl-no-results {
  padding: 20px; text-align: center; color: #94A3B8;
  font-size: 12px; background: #F8FAFC;
  border: 1px dashed #E2E8F0; border-radius: 8px;
}

/* ─── Edit Mode — Action panel ───────────────── */
.edit-override-banner {
  display: flex; align-items: flex-start; gap: 8px;
  background: #F8FAFC; border: 1px solid #E2E8F0;
  border-left: 3px solid #94A3B8;
  border-radius: 7px; padding: 10px 12px; margin-bottom: 16px;
  font-size: 11.5px; color: #334155; line-height: 1.45;
}
.edit-override-banner svg { flex-shrink: 0; margin-top: 1px; }

.edit-count-row { font-size: 11px; color: #64748B; margin-bottom: 14px; }
.edit-count-row .count-num { font-weight: 600; color: #0F172A; }
.edit-count-empty { color: #94A3B8; font-style: italic; }

.cost-warn-strip {

/* ─────────────────────────────────────────────────
   BUILD QUEUE ROW HTML
───────────────────────────────────────────────── */
function buildQueueRow(item) {
  const r = item.qRow;
  const qc = item.queue;

  let aplBlock = '';

  // Current APL line
  if (r.curLabel) {
    const tagHtml = r.tag
      ? `<span class="q-apl-tag">(${r.tag})</span>`
      : (item.queue !== 'red' ? `<span class="q-apl-tag">(Default)</span>` : '');
    const moreHtml = r.moreOpts
      ? `<div class="q-more-opts">${r.moreOpts}</div>` : '';

    aplBlock += `
      <div class="q-apl-line">Current: <strong>${r.curLabel}</strong>${tagHtml}</div>
      ${moreHtml}`;
  } else {
    aplBlock += `<div class="q-apl-line">Current: <span class="q-no-suggest">No supplier on file</span></div>`;
  }

  // Suggested APL line
  if (r.sugLabel) {
    aplBlock += `<div class="q-apl-line">Suggested: <strong>${r.sugLabel}</strong></div>`;
  } else if (item.queue !== 'red') {
    aplBlock += `<div class="q-apl-line">Suggested: <span class="q-no-suggest">No suggestion yet</span></div>`;
  } else {
    aplBlock += `<div class="q-apl-line">Suggested: <span class="q-no-suggest">Awaiting mapping</span></div>`;
  }

  const savingHtml = r.saving
    ? `<div class="q-saving">↓ ${r.saving.replace('↓ ', '')}</div>` : '';

  const badgeHtml = r.badge
    ? `<span class="q-badge">${r.badge}</span>` : '';

  return `
    <div class="q-item c-${qc}" data-queue="${qc}" data-key="${item.key}" onclick="selectItem(this)">
      <div class="q-name">${item.name}${badgeHtml}</div>
      <div class="q-loc">${item.site} &bull; ${item.pending}</div>
      <div class="q-apl-block">${aplBlock}</div>
      ${savingHtml}
      <div class="q-reason">${r.reason}</div>
    </div>`;
}

/* ─────────────────────────────────────────────────
   RENDER DETAIL PANEL
───────────────────────────────────────────────── */
function renderDetail(item) {
  // Header
  document.getElementById('detail-title').textContent = item.name;
  document.getElementById('detail-status').textContent = item.statusTag;
  document.getElementById('detail-breadcrumb').innerHTML =
    item.breadcrumb.map((b, i) =>
      i === 0 ? `<span>${b}</span>`
              : `<span class="bc-sep">›</span><span>${b}</span>`
    ).join('');

  // Body
  document.getElementById('detail-body').innerHTML = buildDetailBody(item);
}

function buildDetailBody(item) {
  const recTypeClass = item.rec ? `rc-${item.rec.type}` : '';
  const recIconPath = item.rec && item.rec.type === 'red'
    ? `<path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17" stroke-width="2.5" stroke-linecap="round"/>`
    : item.rec && item.rec.type === 'green'
    ? `<polyline points="20 6 9 17 4 12"/>`
    : `<circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16" stroke-width="2.5" stroke-linecap="round"/>`;

  let recCard = item.rec ? `
    <div class="rec-card ${recTypeClass}">
      <div class="rec-icon">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#64748B" stroke-width="2">${recIconPath}</svg>
      </div>
      <div>
        <div class="rec-label">Recommended Action</div>
        <div class="rec-heading">${item.rec.heading}</div>
        <div class="rec-sub">${item.rec.sub}</div>
      </div>
    </div>` : '';

  // Confirmed state — takes priority over all other modes
  if (confirmedItems[item.key]) return buildConfirmedDetailBody(item);
  // Green queue — read-only view (pre-existing items not confirmed in this session)
  if (item.queue === 'green') return buildGreenReadOnlyDetailBody(item);
  // Blue queue — transition view (retiring APL + candidates; never auto-overridden)
  if (item.queue === 'blue') return buildBlueDetailBody(item);
  // Red queue — full-width APL search (no comparison UI; assign mode is the only state)
  if (item.queue === 'red') {
    const histHtml = item.history ? buildHistory(item) : '';
    const redRec = `
      <div class="rec-card rc-red">
        <div class="rec-icon">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#64748B" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <line x1="8" y1="12" x2="16" y2="12"/>
          </svg>
        </div>
        <div>
          <div class="rec-label">No Match Found</div>
          <div class="rec-heading">${item.rec?.heading || 'No APL match found — manual assignment required'}</div>
          <div class="rec-sub">${item.rec?.sub || 'Search for available APLs and assign one to this ingredient.'}</div>
        </div>
      </div>`;
    return redRec + buildEditSuggestedCol(item) + histHtml;
  }

  // Review mode — show override rec card + review columns
  if (reviewMode) {
    const histHtml = item.history ? buildHistory(item) : '';
    return buildOverrideRecCard() + `
      <div class="apl-cols">
        <div>${buildReviewCurrentAPLs()}</div>
        <div>${buildReviewSuggestedCol(item)}</div>
      </div>` + histHtml;
  }

  // No supplier state — but in edit mode always show two-column layout
  if (!editMode && item.currentAPLs.length === 0 && !item.suggested) {
    const histHtml = item.history ? buildHistory(item) : '';
    return recCard + `
      <div class="apl-cols" style="grid-template-columns:1fr">
        <div>
          <div class="apl-col-title">Current APLs</div>
          <div class="no-supplier-block">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#94A3B8" stroke-width="1.5">
              <circle cx="12" cy="12" r="10"/>
              <line x1="8" y1="12" x2="16" y2="12"/>
            </svg>
            <p><strong>No supplier on file</strong><br>This ingredient has not been mapped to any APL yet.</p>
          </div>
        </div>
      </div>` + histHtml;
  }

  // Normal or edit mode: two columns
  let currentCol  = buildCurrentAPLs(item);
  let suggestedCol = editMode ? buildEditSuggestedCol(item) : buildSuggestedAPL(item);
  const histHtml  = item.history ? buildHistory(item) : '';

  return recCard + `
    <div class="apl-cols">
      <div>${currentCol}</div>
      <div>${suggestedCol}</div>
    </div>` + histHtml;
}

function buildCurrentAPLs(item) {
  let html = `<div class="apl-col-title">Current APLs</div>`;

  item.currentAPLs.forEach((apl, idx) => {
    const isDefault = apl.isDefault;
    const transTag = apl.transitioning
      ? `<span class="badge-trans">Transitioning</span>` : '';

    html += `
      <div class="apl-card ${isDefault ? 'default-apl' : ''}">
        <div class="card-header">
          ${isDefault ? `<span class="star">★</span>` : ''}
          <span class="apl-tag apl-tag-light">${apl.id}</span>
          ${isDefault ? `<span class="badge-default">Default</span>` : ''}
          ${transTag}
        </div>
        <div class="field-row">
          <span class="field-label">Brand</span>
          <span class="field-value">${apl.brand}</span>
        </div>
        <div class="field-grid field-row">
          <div>
            <span class="field-label">Pack Size</span>
            <span class="field-value">${apl.size}</span>
          </div>
          <div>
            <span class="field-label">Cost</span>
            <span class="field-value">${apl.cost}</span>
            ${apl.vs ? `<span class="cost-compare">${apl.vs}</span>` : ''}
          </div>
        </div>
        <span class="status-tag">Active</span>
      </div>`;
  });

  // Extra APLs (hidden by default)
  if (item.extraAPLs.length > 0) {
    item.extraAPLs.forEach((apl, i) => {
      html += `
        <div class="apl-card apl-extra" id="apl-extra-${i}">
          <div class="card-header">
            <span class="apl-tag apl-tag-light">${apl.id}</span>
          </div>
          <div class="field-row">
            <span class="field-label">Brand</span>
            <span class="field-value">${apl.brand}</span>
          </div>
          <div class="field-grid field-row">
            <div>
              <span class="field-label">Pack Size</span>
              <span class="field-value">${apl.size}</span>
            </div>
            <div>
              <span class="field-label">Cost</span>
              <span class="field-value">${apl.cost}</span>
              ${apl.vs ? `<span class="cost-compare">${apl.vs}</span>` : ''}
            </div>
          </div>
          <span class="status-tag">Active</span>
        </div>`;
    });

    const n = item.extraAPLs.length;
    html += `
      <button class="view-all-btn" id="view-all-btn" onclick="toggleViewAll()">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        ${n} more option${n > 1 ? 's' : ''} (view all)
      </button>`;
  }

  return html;
}

function buildSuggestedAPL(item) {
  let html = `<div class="apl-col-title">Suggested APL</div>`;

  if (!item.suggested) {
    html += `
      <div class="no-supplier-block">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#94A3B8" stroke-width="1.5">
          <circle cx="12" cy="12" r="10"/>
          <line x1="8" y1="12" x2="16" y2="12"/>
        </svg>
        <p>No AI suggestion available for this item.</p>
      </div>`;
    return html;
  }

  const s = item.suggested;
  html += `
    <div class="apl-card suggested-card">
      <div class="card-header">
        <span class="apl-tag apl-tag-suggest">${s.id}</span>
        <span class="badge-new">New</span>
        <span class="badge-diff">${s.diff}</span>
      </div>
      <div class="field-row">
        <span class="field-label">Brand</span>
        <span class="field-value">${s.brand}</span>
      </div>
      <div class="field-grid field-row">
        <div>
          <span class="field-label">Pack Size</span>
          <span class="field-value">${s.size}</span>
        </div>
        <div>
          <span class="field-label">Cost</span>
          <span class="field-value">${s.cost}</span>
        </div>
      </div>
      <div class="savings-pill">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/>

        </svg>

function buildHistory(item) {
  const h = item.history;
  return `
    <div class="history-context">
      <div>
        <div class="hc-label">Previously used</div>
        <div class="hc-value">${h.prev}</div>
      </div>
      <div>
        <div class="hc-label">Last updated</div>
        <div class="hc-value">${h.updated}</div>
      </div>
    </div>`;
}

/* ─────────────────────────────────────────────────
   RENDER ACTION PANEL
───────────────────────────────────────────────── */
function renderAction(item) {
  // Confirmed state — takes priority
  if (confirmedItems[item.key]) {
    document.getElementById('action-body').innerHTML = buildConfirmedActionBody();
    return;
  }
  // Green queue — read-only (pre-existing items not confirmed in this session)
  if (item.queue === 'green') {
    document.getElementById('action-body').innerHTML = buildGreenReadOnlyAction();
    return;
  }
  // Blue queue — transition actions (keep / plan replacement)
  if (item.queue === 'blue') {
    document.getElementById('action-body').innerHTML = buildBlueActionBody(item);
    return;
  }
  // Edit mode (RED auto-enters this; AMBER enters via Modify Selection)
  if (editMode) {
    document.getElementById('action-body').innerHTML = buildEditActionBody(item);
    return;
  }
  // Review mode (post-save)
  if (reviewMode) {
    document.getElementById('action-body').innerHTML = buildReviewActionBody(item);
    return;
  }

  const a = item.action;
  let html = '';

  if (a.opt1 && a.opt2) {
    html += `
      <div class="p-section-title">Default Handling</div>
      <div class="p-section-sub">How should this APL be treated?</div>
      <div class="radio-group">
        <label class="radio-opt selected" onclick="selectRadio(this)">
          <input type="radio" name="handling-${item.key}" checked>
          <div>
            <div class="r-label">${a.opt1.label}</div>
            <div class="r-cost"><span class="r-cost-save">${a.opt1.cost}</span> — ${a.opt1.sub}</div>
          </div>
        </label>
        <label class="radio-opt" onclick="selectRadio(this)">
          <input type="radio" name="handling-${item.key}">
          <div>
            <div class="r-label">${a.opt2.label}</div>
            <div class="r-cost">${a.opt2.cost} — ${a.opt2.sub}</div>
          </div>
        </label>
      </div>
      <div class="panel-divider"></div>`;
  } else {
    html += `
      <div class="p-section-title">Action Required</div>
      <div class="p-section-sub" style="margin-bottom:20px">No supplier is currently mapped to this ingredient.</div>
      <div class="panel-divider"></div>`;
  }

  html += `<div class="action-btns">`;

  // Primary button — assignMode items trigger edit mode directly
  const btnClass = a.assignMode ? 'btn-confirm btn-assign' : 'btn-confirm';
  const btnClick = a.assignMode ? 'onclick="enterEditMode()"' : 'onclick="triggerConfirmMapping()"';
  const btnIcon  = a.assignMode
    ? `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>`
    : `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>`;

  html += `
    <div class="btn-wrap">
      <button class="${btnClass}" ${btnClick}>${btnIcon} ${a.btnLabel}</button>
      <div class="btn-desc">${a.btnDesc}</div>
    </div>`;

  if (a.showModify) {
    html += `
      <div class="btn-wrap">
        <button class="btn-modify" onclick="enterEditMode()">Modify Selection</button>
        <div class="btn-desc">Override the AI suggestion manually</div>
      </div>`;
  }

  if (a.showReject) {
    html += `
      <div class="btn-wrap">
        <button class="btn-reject" onclick="rejectToRed()">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
          Reject
        </button>
        <div class="btn-desc">Decline and request new options</div>
      </div>`;
  }

  html += `</div>`;
  document.getElementById('action-body').innerHTML = html;
}

/* ─────────────────────────────────────────────────
   INTERACTIONS
───────────────────────────────────────────────── */
let currentKey = null;

function selectItem(el) {
  // Deselect all
  document.querySelectorAll('.q-item.selected').forEach(x => x.classList.remove('selected'));
  el.classList.add('selected');

  const key = el.dataset.key;
  if (!key || !ITEMS[key]) return;
  currentKey = key;

  // Reset transient state
  aplExpanded     = false;
  editMode        = false;
  editSelections  = [];
  editDefaultId   = null;
  reviewMode      = false;
  savedSelections = [];
  savedDefaultId  = null;

  // RED items: search/assign is their default state — auto-enter edit mode
  if (ITEMS[key].queue === 'red') editMode = true;

  renderDetail(ITEMS[key]);
  renderAction(ITEMS[key]);
}

function filterQueue(queue) {
  // Update tab active state
  document.querySelectorAll('.ftab').forEach(t =>
    t.classList.toggle('active', t.dataset.queue === queue)
  );
  // Show/hide rows
  let firstEl = null;
  let visible = 0;
  document.querySelectorAll('.q-item').forEach(item => {
    const show = item.dataset.queue === queue;
    item.style.display = show ? '' : 'none';
    item.classList.remove('selected');
    if (show) { visible++; if (!firstEl) firstEl = item; }
  });
  document.getElementById('q-empty').style.display = visible === 0 ? 'block' : 'none';
  document.getElementById('search-box').value = '';

  // Auto-select first item
  if (firstEl) {
    firstEl.classList.add('selected');
    const key = firstEl.dataset.key;
    if (key && ITEMS[key]) {
      currentKey      = key;
      aplExpanded     = false;
      editMode        = false;
      editSelections  = [];
      editDefaultId   = null;
      reviewMode      = false;
      savedSelections = [];
      savedDefaultId  = null;
      // RED items: auto-enter edit (assign) mode
      if (ITEMS[key].queue === 'red') editMode = true;
      renderDetail(ITEMS[key]);
      renderAction(ITEMS[key]);
    }
  } else {
    // Empty queue
    document.getElementById('detail-title').textContent = 'No items';
    document.getElementById('detail-status').textContent = '';
    document.getElementById('detail-breadcrumb').innerHTML = '';
    document.getElementById('detail-body').innerHTML = `
      <div style="padding:40px 24px;text-align:center;color:#94A3B8">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#CBD5E1" stroke-width="1.5" style="margin:0 auto 12px;display:block">
          <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
          <polyline points="22 4 12 14.01 9 11.01"/>
        </svg>
        <p style="font-size:13px">All items in this queue have been processed.</p>
      </div>`;
    document.getElementById('action-body').innerHTML = '';
  }
}

function filterSearch(val) {
  const q = val.trim().toLowerCase();
  const activeQueue = document.querySelector('.ftab.active').dataset.queue;
  let visible = 0;
  document.querySelectorAll('.q-item').forEach(item => {
    if (item.dataset.queue !== activeQueue) return;
    const match = !q || item.dataset.key.replace(/-/g,' ').includes(q)
                     || (ITEMS[item.dataset.key]?.name || '').toLowerCase().includes(q);
    item.style.display = match ? '' : 'none';
    if (match) visible++;
  });
  document.getElementById('q-empty').style.display = visible === 0 ? 'block' : 'none';
}

/* Toggle extra APL cards */
let aplExpanded = false;

/* ─── Edit mode state ─────────────────────────── */
let editMode       = false;
let editSelections = []; // [{ id, costNum, brand, size, tag }]
let editDefaultId  = null; // id of the APL marked as new default

/* ─── Review (post-save) state ─────────────────── */
let reviewMode      = false;
let savedSelections = []; // snapshot of editSelections at save time
let savedDefaultId  = null; // snapshot of editDefaultId at save time

/* ─── Confirmed state (persistent per session) ── */
const confirmedItems = {}; // key → { apls:[{id,brand,size,costNum,tag}], defaultId }
function toggleViewAll() {
  aplExpanded = !aplExpanded;
  document.querySelectorAll('.apl-extra').forEach(el =>
    el.classList.toggle('visible', aplExpanded)
  );
  const btn = document.getElementById('view-all-btn');
  if (!btn) return;
  if (aplExpanded) {
    btn.innerHTML = `
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <line x1="5" y1="12" x2="19" y2="12"/>
      </svg> Show fewer options`;
  } else {
    const n = ITEMS[currentKey]?.extraAPLs?.length || 1;
    btn.innerHTML = `
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
      </svg> ${n} more option${n > 1 ? 's' : ''} (view all)`;
  }
}

/* Radio selection */
function selectRadio(el) {
  const group = el.closest('.radio-group');
  if (group) group.querySelectorAll('.radio-opt').forEach(r => r.classList.remove('selected'));
  el.classList.add('selected');
  const radio = el.querySelector('input[type="radio"]');
  if (radio) radio.checked = true;
}

/* ─────────────────────────────────────────────────
   EDIT MODE FUNCTIONS
───────────────────────────────────────────────── */
function enterEditMode() {
  // If coming from review mode, restore the saved selections so user can tweak
  if (reviewMode && savedSelections.length > 0) {
    editSelections = savedSelections.map(s => ({ ...s }));
    editDefaultId  = savedDefaultId;
  } else {
    // Fresh edit — pre-select the AI-suggested APL
    const pool      = APL_POOLS[currentKey] || [];
    const suggested = pool.find(p => p.tag === 'suggested');
    if (suggested) {
      editSelections = [{ id: suggested.id, costNum: suggested.costNum,
                          brand: suggested.brand, size: suggested.size, tag: suggested.tag }];
      editDefaultId  = suggested.id;
    } else {
      editSelections = [];
      editDefaultId  = null;
    }
  }

  editMode        = true;
  reviewMode      = false;
  savedSelections = [];
  savedDefaultId  = null;

  renderDetail(ITEMS[currentKey]);
  renderAction(ITEMS[currentKey]);
}

/* Save Mapping — show loading state, then move directly to GREEN after 1 s */
function saveMapping() {
  savedSelections = editSelections.map(s => ({ ...s }));
  savedDefaultId  = editDefaultId;
  editMode       = false;
  editSelections = [];
  editDefaultId  = null;

  // Loading state on the Save / Confirm Assignment button
  const btn = document.getElementById('edit-save-btn');
  if (btn) {
    btn.disabled = true;
    btn.innerHTML = spinnerSVG() + ' Saving\u2026';
  }

  // PRD: wait 1 s, then move to GREEN and show toast
  setTimeout(() => {
    confirmMapping();
    showToast('Mapping confirmed');
  }, 1000);
}

/* Cancel edit — discard, return to previous state */
function cancelEdit() {
  editMode       = false;
  editSelections = [];
  editDefaultId  = null;
  // If we were editing from review mode, go back to review; otherwise normal
  renderDetail(ITEMS[currentKey]);
  renderAction(ITEMS[currentKey]);
}

/* ─────────────────────────────────────────────────
   QUEUE HELPER UTILITIES
───────────────────────────────────────────────── */

/* Move an item to a new queue — updates data model, DOM row, and tab counts.
   Returns the previous queue name. */
function moveItemToQueue(key, newQueue) {
  const item      = ITEMS[key];
  const prevQueue = item.queue;
  if (prevQueue === newQueue) return prevQueue;

  // Update data model
  item.queue = newQueue;

  // Update DOM row
  const qRow = document.querySelector(`.q-item[data-key="${key}"]`);
  if (qRow) {
    qRow.dataset.queue = newQueue;
    qRow.classList.remove(`c-${prevQueue}`);
    qRow.classList.add(`c-${newQueue}`);
    qRow.classList.remove('selected');
    // Hide from currently active tab if it was showing the source queue
    const activeQueue = document.querySelector('.ftab.active')?.dataset.queue;
    if (activeQueue === prevQueue) qRow.style.display = 'none';
  }

  // Update tab counts
  const prevCount = document.querySelector(`.ftab-${prevQueue} .ftab-count`);
  if (prevCount) prevCount.textContent = Math.max(0, parseInt(prevCount.textContent || '0') - 1);
  const newCount  = document.querySelector(`.ftab-${newQueue} .ftab-count`);
  if (newCount)  newCount.textContent  = parseInt(newCount.textContent  || '0') + 1;

  return prevQueue;
}

/* After removing an item from a queue, auto-select the next visible item
   in that queue. Shows an empty-queue message if none remain. */
function autoSelectNext(fromQueue) {
  let nextEl = null;
  document.querySelectorAll('.q-item').forEach(el => {
    if (nextEl) return;
    if (el.dataset.queue !== fromQueue) return;
    if (el.style.display === 'none') return;
    nextEl = el;
  });

  if (nextEl) {
    selectItem(nextEl);
    nextEl.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
  } else {
    // Queue fully processed — show empty-queue detail state
    currentKey = null;
    document.getElementById('detail-title').textContent    = 'Queue complete';
    document.getElementById('detail-status').textContent   = '';
    document.getElementById('detail-breadcrumb').innerHTML = '';
    document.getElementById('detail-body').innerHTML = `
      <div style="padding:48px 24px;text-align:center;color:#94A3B8">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#CBD5E1" stroke-width="1.5"
             style="margin:0 auto 14px;display:block">
          <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
          <polyline points="22 4 12 14.01 9 11.01"/>
        </svg>
        <p style="font-size:13px;margin:0">All items in this queue have been processed.</p>
      </div>`;
    document.getElementById('action-body').innerHTML = '';
    document.getElementById('q-empty').style.display = 'block';
  }
}

/* ─────────────────────────────────────────────────
   CONFIRM / REJECT ACTIONS
───────────────────────────────────────────────── */

/* Confirm Mapping — finalize APL selection, move item to Green,
   stay on current tab and auto-select next item. */
function confirmMapping() {
  const key  = currentKey;
  const item = ITEMS[key];
  const prevQueue = item.queue;

  // ── 1. Capture confirmed APLs ──────────────────────
  let apls, defaultId;
  if (savedSelections.length > 0) {
    apls      = savedSelections.map(s => ({ ...s }));
    defaultId = savedDefaultId;
  } else if (item.suggested) {
    // Direct confirm (no edit flow) — use the AI suggestion
    const cost = parseFloat((item.suggested.cost || '₹0').replace(/[^\d.]/g, '')) || 0;
    apls      = [{ id: item.suggested.id, brand: item.suggested.brand,
                   size: item.suggested.size, costNum: cost, tag: 'suggested' }];
    defaultId = item.suggested.id;
  } else {
    apls      = item.currentAPLs.map(a => ({
      id: a.id, brand: a.brand, size: a.size, tag: null,
      costNum: parseFloat((a.cost || '₹0').replace(/[^\d.]/g, '')) || 0
    }));
    defaultId = item.currentAPLs.find(a => a.isDefault)?.id || null;
  }
  confirmedItems[key] = { apls, defaultId };

  // ── 2. Clear review / edit state ───────────────────
  reviewMode      = false;
  savedSelections = [];
  savedDefaultId  = null;
  editMode        = false;
  editSelections  = [];
  editDefaultId   = null;

  // ── 3. Update item status + inject Mapped badge ────
  item.statusTag = 'Mapped';
  const qRow = document.querySelector(`.q-item[data-key="${key}"]`);
  if (qRow) {
    const nameEl = qRow.querySelector('.q-name');
    if (nameEl && !nameEl.querySelector('.badge-mapped')) {
      const badge = document.createElement('span');
      badge.className = 'badge-mapped';
      badge.innerHTML = `<svg width="8" height="8" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg> Mapped`;
      nameEl.appendChild(badge);
    }
  }

  // ── 4. Move to green, stay on current tab ──────────
  moveItemToQueue(key, 'green');

  // ── 5. Auto-select next item in the source queue ───
  autoSelectNext(prevQueue);
}

/* Reject — move item to Red queue, auto-select next in source queue */
function rejectToRed() {
  const key  = currentKey;
  const item = ITEMS[key];
  const prevQueue = item.queue;

  // Update item state so it shows correctly in the Red queue
  item.statusTag = 'Rejected';
  item.rec = {
    type: 'red',
    heading: 'Mapping rejected — manual review required',
    sub: 'The suggested mapping was declined. Assign a supplier manually or request a new suggestion.'
  };
  item.action = {
    opt1: null, opt2: null,
    btnLabel: 'Assign Supplier',
    btnDesc:  'Manually select a supplier for this ingredient',
    showModify: false, showReject: false, assignMode: true
  };

  // Clear review / edit state
  reviewMode      = false;
  savedSelections = [];
  savedDefaultId  = null;
  editMode        = false;
  editSelections  = [];
  editDefaultId   = null;

  // Move to red, stay on current tab
  moveItemToQueue(key, 'red');

  // Auto-select next in source queue
  autoSelectNext(prevQueue);
}

/* Show a floating success toast — auto-dismisses after 2.5 s */
function showToast(msg) {
  const old = document.getElementById('app-toast');
  if (old) { clearTimeout(old._t); old.remove(); }

  const el = document.createElement('div');
  el.id = 'app-toast';
  el.className = 'toast';
  el.innerHTML = `
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#4ADE80" stroke-width="2.5">
      <polyline points="20 6 9 17 4 12"/>
    </svg>
    ${msg}`;
  document.body.appendChild(el);

  el._t = setTimeout(() => {
    el.classList.add('toast-out');
    setTimeout(() => el.remove(), 180);
  }, 2500);
}

/* Shared spinner HTML — reused in all loading buttons */
function spinnerSVG() {
  return `<svg class="btn-spin" width="13" height="13" viewBox="0 0 24 24"
              fill="none" stroke="white" stroke-width="2.5">
            <path d="M21 12a9 9 0 1 1-6.219-8.56"/>
          </svg>`;
}

/* Confirm Mapping with loading state:
   1. Disable button + show "Saving…"
   2. Wait 1 s
   3. Run confirmMapping() — moves item to Green, auto-selects next
   4. Show success toast */
function triggerConfirmMapping() {
  const btn = document.querySelector('#action-body .btn-confirm');
  if (btn && !btn.disabled) {
    btn.disabled = true;
    btn.innerHTML = spinnerSVG() + ' Saving\u2026';
  }
  setTimeout(() => {
    confirmMapping();
    showToast('Mapping confirmed');
  }, 1000);
}

/* Keep Current (Blue queue) with same loading UX */
function triggerKeepCurrentAPL() {
  const btn = document.querySelector('#action-body .btn-confirm');
  if (btn && !btn.disabled) {
    btn.disabled = true;
    btn.innerHTML = spinnerSVG() + ' Saving\u2026';
  }
  setTimeout(() => {
    keepCurrentAPL();
    showToast('Mapping confirmed — existing supplier kept');
  }, 1000);
}

/* Toggle an APL option.
   idOrEl = .apl-option element (from pool) OR id string (from Selected APLs × button). */
function toggleAPLOption(idOrEl) {
  let id, costNum, brand, size, tag;

  if (typeof idOrEl === 'string') {
    const sel = editSelections.find(s => s.id === idOrEl);
    if (!sel) return;
    ({ id, costNum, brand, size, tag } = sel);
  } else {
    id      = idOrEl.dataset.aplId;
    costNum = parseFloat(idOrEl.dataset.costNum);
    brand   = idOrEl.dataset.brand;
    size    = idOrEl.dataset.size;
    tag     = idOrEl.dataset.tag || null;
  }

  const idx = editSelections.findIndex(s => s.id === id);
  if (idx >= 0) {
    editSelections.splice(idx, 1);
    if (editDefaultId === id)
      editDefaultId = editSelections.length > 0 ? editSelections[0].id : null;
  } else {
    editSelections.push({ id, costNum, brand, size, tag });
    if (editSelections.length === 1) editDefaultId = id; // auto-default first addition
  }

  // Update pool row in the detail panel
  const poolRow = document.querySelector(`.apl-option[data-apl-id="${id}"]`);
  if (poolRow) {
    const nowSelected = editSelections.some(s => s.id === id);
    poolRow.classList.toggle('opt-added', nowSelected);
    const btn = poolRow.querySelector('.apl-opt-btn');
    if (btn) {
      btn.textContent = nowSelected ? '✓ Added' : '+ Add';
      btn.className   = `apl-opt-btn ${nowSelected ? 'btn-opt-remove' : 'btn-opt-add'}`;
    }
  }

  renderEditSelectedAPLs();
}

/* Change which selected APL is the default */
function setEditDefault(id) {
  editDefaultId = id;
  document.querySelectorAll('.sel-apl-row').forEach(row =>
    row.classList.toggle('is-default', row.dataset.selId === id)
  );
  updateEditActionState();
}

/* Re-render just the Selected APLs list in the action panel */
function renderEditSelectedAPLs() {
  const listEl = document.getElementById('sel-apl-list');
  if (!listEl) return;

  if (editSelections.length === 0) {
    listEl.innerHTML = `<div class="sel-empty">No APLs added yet. Select from the list.</div>`;
  } else {
    listEl.innerHTML = editSelections.map(s => {
      const isDef = s.id === editDefaultId;
      return `
        <div class="sel-apl-row ${isDef ? 'is-default' : ''}" data-sel-id="${s.id}">
          <label class="sel-radio-wrap" title="${isDef ? 'New default' : 'Set as default'}">
            <input type="radio" name="edit-default" value="${s.id}"
                   ${isDef ? 'checked' : ''} onchange="setEditDefault('${s.id}')">
          </label>
          <div class="sel-apl-info">
            <span class="sel-apl-brand">${s.brand}</span>
            <span class="sel-apl-meta">${s.id} &middot; ₹${s.costNum.toFixed(2)}</span>
          </div>
          <button class="sel-remove-btn" onclick="toggleAPLOption('${s.id}')" title="Remove">
            <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>`;
    }).join('');
  }

  updateEditActionState();
}

/* Live-filter the APL option rows */
function filterAPLOptions(val) {
  const q = val.trim().toLowerCase();
  let anyVisible = false;
  document.querySelectorAll('.apl-option').forEach(opt => {
    const match = !q
      || (opt.dataset.aplId || '').toLowerCase().includes(q)
      || (opt.dataset.brand || '').toLowerCase().includes(q);
    opt.style.display = match ? '' : 'none';
    if (match) anyVisible = true;
  });
  const noRes = document.getElementById('apl-no-results');
  if (noRes) noRes.style.display = anyVisible ? 'none' : 'block';
}

/* Update save button, validation hint, and cost warning */
function updateEditActionState() {
  const defaultCost = DEFAULT_COSTS[currentKey];
  const n           = editSelections.length;
  const hasDefault  = editDefaultId !== null;
  const canSave     = n > 0 && hasDefault;

  // Save button
  const saveBtn = document.getElementById('edit-save-btn');
  if (saveBtn) saveBtn.disabled = !canSave;

  // Validation hint
  const hintEl = document.getElementById('edit-val-hint');
  if (hintEl) {
    if (n === 0) {
      hintEl.textContent = 'Select at least one APL to save';
      hintEl.className   = 'validation-hint v-error';
      hintEl.style.display = '';
    } else if (!hasDefault) {
      hintEl.textContent = 'Choose a default APL above';
      hintEl.className   = 'validation-hint v-error';
      hintEl.style.display = '';
    } else {
      hintEl.style.display = 'none';
    }
  }

  // Cost warning — triggers when the chosen default exceeds current default cost
  const warnEl = document.getElementById('edit-cost-warn');
  if (warnEl) {
    const defSel    = editSelections.find(s => s.id === editDefaultId);
    const expensive = defaultCost !== null && defSel && defSel.costNum > defaultCost;
    warnEl.style.display = expensive ? 'flex' : 'none';
  }
}

  pool.forEach(apl => {

    html += `

  html += `

    </div>`;

  return html;
}

          </div>
        </div>
        <span class="status-tag">Confirmed</span>
      </div>`;
  });

  // Right column — summary block
  const rightCol = `
    <div class="apl-col-title">Summary</div>
    <div class="mapping-applied-block">
      <div class="ma-icon">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#16A34A" stroke-width="2.5">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </div>
      <div>
        <div class="ma-title">Mapping applied</div>
        <div class="ma-sub">${apls.length} APL${apls.length > 1 ? 's' : ''} confirmed for this ingredient</div>
        ${defApl ? `<div class="ma-default">Default: <strong>${defApl.brand}</strong></div>` : ''}
      </div>
    </div>`;

  const histHtml = item.history ? buildHistory(item) : '';
  return recCard + `
    <div class="apl-cols">
      <div>${leftCol}</div>
      <div>${rightCol}</div>
    </div>` + histHtml;
}

function buildConfirmedActionBody() {
  return `
    <div class="confirmed-strip">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#15803D" stroke-width="2.5">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
      Mapping successfully saved
    </div>

    <div class="p-section-title">Mapping Confirmed</div>
    <div class="p-section-sub" style="margin-bottom:20px">
      This item has been mapped and moved to the green queue.
    </div>

    <div class="panel-divider"></div>

    <div class="action-btns">
      <div class="btn-wrap">
        <button class="btn-view-history">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <polyline points="12 6 12 12 16 14"/>
          </svg>
          View History
        </button>
        <div class="btn-desc">Review previous changes for this item</div>
      </div>
    </div>`;
}

/* ─────────────────────────────────────────────────
   GREEN QUEUE — READ-ONLY VIEWS
   (for items that were already in green at page load,
    i.e. not confirmed during this session)
───────────────────────────────────────────────── */

function buildGreenReadOnlyDetailBody(item) {
  // Rec card — green confirmed style
  const recCard = `
    <div class="rec-card rc-green">
      <div class="rec-icon">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#64748B" stroke-width="2">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </div>
      <div>
        <div class="rec-label">Confirmed</div>
        <div class="rec-heading">${item.rec?.heading || 'Mapping confirmed'}</div>
        <div class="rec-sub">${item.rec?.sub || 'This mapping has been applied to the system.'}</div>
      </div>
    </div>`;

  // Left column — current (confirmed) APLs
  let leftCol = `<div class="apl-col-title">Confirmed APLs</div>`;
  item.currentAPLs.forEach(apl => {
    const isDef = apl.isDefault;
    leftCol += `
      <div class="apl-card ${isDef ? 'default-apl' : ''}">
        <div class="card-header">
          ${isDef ? `<span class="star">★</span>` : ''}
          <span class="apl-tag apl-tag-light">${apl.id}</span>
          ${isDef ? `<span class="badge-default">Default</span>` : ''}
        </div>
        <div class="field-row">
          <span class="field-label">Brand</span>
          <span class="field-value">${apl.brand}</span>
        </div>
        <div class="field-grid field-row">
          <div>
            <span class="field-label">Pack Size</span>
            <span class="field-value">${apl.size}</span>
          </div>
          <div>
            <span class="field-label">Cost</span>
            <span class="field-value">${apl.cost}</span>
          </div>
        </div>
        <span class="status-tag">Confirmed</span>
      </div>`;
  });

  // Right column — mapping summary
  const defApl = item.currentAPLs.find(a => a.isDefault);
  const rightCol = `
    <div class="apl-col-title">Summary</div>
    <div class="mapping-applied-block">
      <div class="ma-icon">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#16A34A" stroke-width="2.5">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </div>
      <div>
        <div class="ma-title">Mapping confirmed</div>
        <div class="ma-sub">${item.currentAPLs.length} APL${item.currentAPLs.length !== 1 ? 's' : ''} confirmed for this ingredient</div>
        ${defApl ? `<div class="ma-default">Default: <strong>${defApl.brand}</strong></div>` : ''}
      </div>
    </div>`;

  const histHtml = item.history ? buildHistory(item) : '';
  return recCard + `
    <div class="apl-cols">
      <div>${leftCol}</div>
      <div>${rightCol}</div>
    </div>` + histHtml;
}

function buildGreenReadOnlyAction() {
  return `
    <div class="confirmed-strip">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#15803D" stroke-width="2.5">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
      Mapping confirmed
    </div>

    <div class="p-section-title">Mapping Active</div>
    <div class="p-section-sub" style="margin-bottom:20px">
      This item is confirmed and the mapping is live in the system.
    </div>

    <div class="panel-divider"></div>

    <div class="action-btns">
      <div class="btn-wrap">
        <button class="btn-view-history">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <polyline points="12 6 12 12 16 14"/>
          </svg>
          View History
        </button>
        <div class="btn-desc">Review previous changes for this item</div>
      </div>
    </div>`;
}

/* ─────────────────────────────────────────────────
   BLUE QUEUE — TRANSITION VIEW
───────────────────────────────────────────────── */

function buildBlueDetailBody(item) {
  // Rec card — blue style, transition context
  const recCard = `
    <div class="rec-card rc-blue">
      <div class="rec-icon">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#64748B" stroke-width="2">
          <path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
          <line x1="12" y1="9" x2="12" y2="13"/>
          <line x1="12" y1="17" x2="12.01" y2="17" stroke-width="2.5" stroke-linecap="round"/>
        </svg>
      </div>
      <div>
        <div class="rec-label">Transition Required</div>
        <div class="rec-heading">${item.rec?.heading || 'APL transition in progress'}</div>
        <div class="rec-sub">${item.rec?.sub || 'Review the retiring APL and decide how to proceed.'}</div>
      </div>
    </div>`;

  // Left column — current APL shown as retiring (do NOT remove the mapping)
  let leftCol = `<div class="apl-col-title">Current APL (Retiring)</div>`;
  if (item.currentAPLs.length > 0) {
    item.currentAPLs.forEach(apl => {
      leftCol += `
        <div class="apl-card retiring-card">
          <div class="card-header">
            <span class="apl-tag apl-tag-light">${apl.id}</span>
            <span class="badge-retiring">Retiring</span>
          </div>
          <div class="field-row">
            <span class="field-label">Brand</span>
            <span class="field-value">${apl.brand}</span>
          </div>
          <div class="field-grid field-row">
            <div>
              <span class="field-label">Pack Size</span>
              <span class="field-value">${apl.size}</span>
            </div>
            <div>
              <span class="field-label">Cost</span>
              <span class="field-value">${apl.cost}</span>
            </div>
          </div>
          <span class="status-tag" style="background:#FFF7ED;color:#C2410C;border-color:#FED7AA">Retiring</span>
        </div>`;
    });
  } else {
    leftCol += `<div class="no-supplier-block"><p>No current APL on file.</p></div>`;
  }

  // Right column — replacement candidates (reference only, no selection)
  const candidates = (APL_POOLS[item.key] || []).filter(c => c.tag === 'suggested' || c.tag === null);
  let rightCol = `<div class="apl-col-title">Replacement Candidates</div>`;
  if (candidates.length === 0) {
    rightCol += `<div class="no-supplier-block" style="text-align:left;padding:16px">
      <p style="font-size:12px">No replacement candidates available yet.</p>
    </div>`;
  } else {
    rightCol += `<div class="replacement-list">`;
    candidates.forEach(c => {
      const isAiPick = c.tag === 'suggested';
      rightCol += `
        <div class="replacement-row">
          <div class="replacement-info">
            <div class="replacement-name">
              ${c.brand}
              ${isAiPick ? `<span class="tag-ai-pick">AI Pick</span>` : ''}
            </div>
            <div class="replacement-meta">
              <span>${c.id}</span>
              <span>${c.size}</span>
            </div>
          </div>
          <span class="replacement-cost">₹${c.costNum.toFixed(2)}</span>
        </div>`;
    });
    rightCol += `</div>`;
  }

  const histHtml = item.history ? buildHistory(item) : '';
  return recCard + `
    <div class="apl-cols">
      <div>${leftCol}</div>
      <div>${rightCol}</div>
    </div>` + histHtml;
}

function buildBlueActionBody(item) {
  return `
    <div class="p-section-title">Transition Decision</div>
    <div class="p-section-sub" style="margin-bottom:20px">
      The current supplier is retiring. Choose how to proceed — existing mapping is preserved until you act.
    </div>

    <div class="panel-divider"></div>

    <div class="action-btns">
      <div class="btn-wrap">
        <button class="btn-confirm" onclick="triggerKeepCurrentAPL()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
          Keep Current (for now)
        </button>
        <div class="btn-desc">Confirm existing mapping — revisit when ready</div>
      </div>
      <div class="btn-wrap">
        <button class="btn-neutral" onclick="planReplacement()">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 12h18M3 6h18M3 18h18"/>
          </svg>
          Plan Replacement
        </button>
        <div class="btn-desc">Move to Amber to select a replacement APL</div>
      </div>
    </div>`;
}

/* Keep Current — confirm existing APL mapping, move BLUE item to GREEN */
function keepCurrentAPL() {
  const key  = currentKey;
  const item = ITEMS[key];
  const prevQueue = item.queue;

  // Confirm existing APLs as the official mapping
  const apls = item.currentAPLs.map(a => ({
    id: a.id, brand: a.brand, size: a.size, tag: null,
    costNum: parseFloat((a.cost || '₹0').replace(/[^\d.]/g, '')) || 0
  }));
  const defaultId = item.currentAPLs.find(a => a.isDefault)?.id
                  || item.currentAPLs[0]?.id
                  || null;
  confirmedItems[key] = { apls, defaultId };

  item.statusTag = 'Mapped';
  const qRow = document.querySelector(`.q-item[data-key="${key}"]`);
  if (qRow) {
    const nameEl = qRow.querySelector('.q-name');
    if (nameEl && !nameEl.querySelector('.badge-mapped')) {
      const badge = document.createElement('span');
      badge.className = 'badge-mapped';
      badge.innerHTML = `<svg width="8" height="8" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg> Mapped`;
      nameEl.appendChild(badge);
    }
  }

  moveItemToQueue(key, 'green');
  autoSelectNext(prevQueue);
}

/* Plan Replacement — move BLUE item to AMBER so user can select a new APL */
function planReplacement() {
  const key  = currentKey;
  const item = ITEMS[key];
  const prevQueue = item.queue;

  item.statusTag = 'Needs Review';
  item.rec = {
    type: 'amber',
    heading: 'Replacement required — select a new supplier',
    sub: 'Current supplier is retiring. Use Modify Selection to choose a replacement APL.'
  };
  item.action = {
    opt1: null, opt2: null,
    btnLabel:   'Select Replacement',
    btnDesc:    'Choose a replacement APL for this ingredient',
    showModify: true,
    showReject: false,
    assignMode: true
  };

  moveItemToQueue(key, 'amber');
  autoSelectNext(prevQueue);
}

/* Clear all selections in RED assign mode (keeps edit mode active) */
function clearRedSelections() {
  editSelections = [];
  editDefaultId  = null;
  document.querySelectorAll('.apl-option').forEach(opt => {
    opt.classList.remove('opt-added');
    const btn = opt.querySelector('.apl-opt-btn');
    if (btn) { btn.textContent = '+ Add'; btn.className = 'apl-opt-btn btn-opt-add'; }
  });
  renderEditSelectedAPLs();
  updateEditActionState();
}

/* Panel tabs */
function switchPanelTab(el) {
  document.querySelectorAll('.p-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
}

/* ─────────────────────────────────────────────────
   INITIALISE
───────────────────────────────────────────────── */
function init() {
  const list = document.getElementById('q-list');
  const empty = document.getElementById('q-empty');

  // Build all rows and insert before the empty state
  Object.values(ITEMS).forEach(item => {
    const tmp = document.createElement('div');
    tmp.innerHTML = buildQueueRow(item).trim();
    const row = tmp.firstElementChild;
    if (item.queue !== 'amber') row.style.display = 'none';
    list.insertBefore(row, empty);
  });

  // Auto-select first amber item
  const firstAmber = list.querySelector('.q-item[data-queue="amber"]');
  if (firstAmber) {
    firstAmber.classList.add('selected');
    const key = firstAmber.dataset.key;
    currentKey = key;
    renderDetail(ITEMS[key]);
    renderAction(ITEMS[key]);
  }
}

init();
</script>
